<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Crypto Dashboard</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b1220;
  color:white;
}

header{
  background:#111827;
  padding:15px;
  text-align:center;
  font-size:20px;
  font-weight:bold;
}

.container{
  max-width:900px;
  margin:auto;
  padding:20px;
}

.card{
  background:#111827;
  padding:15px;
  margin:15px 0;
  border-radius:10px;
}

input{
  width:100%;
  padding:10px;
  margin-top:8px;
  border:none;
  border-radius:6px;
}

button{
  padding:10px;
  margin-top:10px;
  background:#fbbf24;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

.news{
  background:#1f2937;
  padding:10px;
  margin:8px 0;
  border-radius:8px;
}

img{
  width:100%;
  border-radius:10px;
}
</style>
</head>

<body>

<header>Crypto Dashboard 📊</header>

<div class="container">

<!-- LOGIN -->
<div class="card" id="loginBox">
<h2>Login</h2>
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<button onclick="login()">Enter</button>
</div>

<!-- DASHBOARD -->
<div class="card" id="dashboard" style="display:none;">
<h2>Dashboard</h2>
<p>Welcome user 👤</p>
<button onclick="logout()">Logout</button>
</div>

<!-- PRICES -->
<div class="card">
<h2>Live Prices 📈</h2>
BTC: $<span id="btc">...</span><br>
ETH: $<span id="eth">...</span><br>
SOL: $<span id="sol">...</span>
</div>

<!-- CHART -->
<div class="card">
<h2>Bitcoin Chart</h2>
<iframe 
src="https://www.tradingview.com/widgetembed/?symbol=BINANCE:BTCUSDT&theme=dark"
width="100%" height="300"></iframe>
</div>

<!-- NEWS -->
<div class="card">
<h2>Crypto News 📰</h2>
<div id="news">Loading news...</div>
</div>

<!-- INVESTORS -->
<div class="card">
<h2>Top Crypto Figures 💰</h2>

<img src="https://upload.wikimedia.org/wikipedia/commons/5/59/Satoshi_Nakamoto.jpg">
<p>Satoshi Nakamoto</p>

<img src="https://upload.wikimedia.org/wikipedia/commons/6/6f/Vitalik_Buterin_Ethereum.jpg">
<p>Vitalik Buterin</p>

<img src="https://upload.wikimedia.org/wikipedia/commons/4/46/Michael_Saylor.jpg">
<p>Michael Saylor</p>

</div>

</div>

<script>

// 🔐 SIMPLE LOGIN (LOCAL ONLY)
function login(){
  const email = document.getElementById("email").value;
  const pass = document.getElementById("password").value;

  if(!email || !pass){
    alert("Fill all fields");
    return;
  }

  localStorage.setItem("user", email);

  document.getElementById("loginBox").style.display="none";
  document.getElementById("dashboard").style.display="block";
}

function logout(){
  localStorage.removeItem("user");
  location.reload();
}

// 📈 LIVE PRICES
async function loadPrices(){
  try{
    const res = await fetch("https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum,solana&vs_currencies=usd");
    const data = await res.json();

    document.getElementById("btc").innerText = data.bitcoin.usd;
    document.getElementById("eth").innerText = data.ethereum.usd;
    document.getElementById("sol").innerText = data.solana.usd;
  }catch(e){}
}

loadPrices();
setInterval(loadPrices,10000);

// 📰 NEWS (WORKING)
async function loadNews(){
  try{
    const res = await fetch("https://min-api.cryptocompare.com/data/v2/news/?lang=EN");
    const data = await res.json();

    let html = "";

    data.Data.slice(0,5).forEach(n=>{
      html += `
        <div class="news">
          <b>${n.title}</b>
        </div>
      `;
    });

    document.getElementById("news").innerHTML = html;

  }catch(e){
    document.getElementById("news").innerHTML = "News failed to load";
  }
}

loadNews();

</script>

</body>
</html>
