<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Crypto Dashboard</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b1220;
  color:white;
}

header{
  background:#111827;
  padding:15px;
  text-align:center;
  font-size:20px;
}

.container{
  max-width:900px;
  margin:auto;
  padding:20px;
}

.card{
  background:#111827;
  padding:15px;
  margin:15px 0;
  border-radius:10px;
}

input{
  width:100%;
  padding:10px;
  margin-top:8px;
  border:none;
  border-radius:6px;
}

button{
  padding:10px;
  margin-top:10px;
  background:#fbbf24;
  border:none;
  border-radius:6px;
  cursor:pointer;
}
</style>
</head>

<body>

<header>Crypto Dashboard 📊</header>

<div class="container">

<!-- LOGIN -->
<div class="card" id="authBox">
<h2>Login / Signup</h2>
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<button onclick="login()">Enter</button>
</div>

<!-- DASHBOARD -->
<div class="card" id="dashboard" style="display:none;">
<h2>Your Portfolio</h2>
<p>Balance: $<span id="balance">0</span></p>
<button onclick="logout()">Logout</button>
</div>

<!-- LIVE PRICES -->
<div class="card">
<h2>Live Prices</h2>
BTC: $<span id="btc">...</span><br>
ETH: $<span id="eth">...</span><br>
SOL: $<span id="sol">...</span>
</div>

<!-- CHART -->
<div class="card">
<h2>Bitcoin Chart</h2>
<iframe 
src="https://www.tradingview.com/widgetembed/?symbol=BINANCE:BTCUSDT&theme=dark"
width="100%" height="300"></iframe>
</div>

</div>

<script>
// 🔥 FIREBASE CONFIG (PUT YOUR OWN DETAILS HERE)
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_AUTH_DOMAIN",
  projectId: "YOUR_PROJECT_ID"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

let currentUser = null;

// 🔐 LOGIN / SIGNUP
function login(){
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  auth.signInWithEmailAndPassword(email, password)
  .catch(()=>{
    auth.createUserWithEmailAndPassword(email, password)
    .then(user=>{
      db.collection("users").doc(user.user.uid).set({
        balance: 100
      });
    });
  });
}

// 📊 AUTH STATE
auth.onAuthStateChanged(user=>{
  if(user){
    currentUser = user;

    document.getElementById("authBox").style.display="none";
    document.getElementById("dashboard").style.display="block";

    db.collection("users").doc(user.uid)
    .onSnapshot(doc=>{
      if(doc.exists){
        document.getElementById("balance").innerText = doc.data().balance;
      }
    });
  }
});

// 🚪 LOGOUT
function logout(){
  auth.signOut();
  location.reload();
}

// 📈 LIVE PRICES
async function loadPrices(){
  try{
    const res = await fetch("https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum,solana&vs_currencies=usd");
    const data = await res.json();

    document.getElementById("btc").innerText = data.bitcoin.usd;
    document.getElementById("eth").innerText = data.ethereum.usd;
    document.getElementById("sol").innerText = data.solana.usd;
  }catch(e){}
}

loadPrices();
setInterval(loadPrices, 10000);

</script>

</body>
</html>
