<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Step 1 - Working Test</title>
</head>

<body style="background:#0b1220;color:white;font-family:Arial">

<h1>✅ Step 1: Website is Working</h1>

<h2>Bitcoin Price</h2>
<p>$<span id="btc">loading...</span></p>

<h2>Crypto News</h2>
<div id="news">loading...</div>

<script>

// PRICE TEST
async function loadPrice(){
  try{
    const r = await fetch("https://api.coingecko.com/api/v3/simple/price?ids=bitcoin&vs_currencies=usd");
    const d = await r.json();
    document.getElementById("btc").innerText = d.bitcoin.usd;
  }catch(e){
    document.getElementById("btc").innerText = "error";
  }
}
loadPrice();

// NEWS TEST
async function loadNews(){
  try{
    const r = await fetch("https://min-api.cryptocompare.com/data/v2/news/?lang=EN");
    const d = await r.json();

    let html = "";
    d.Data.slice(0,5).forEach(n=>{
      html += "<p>📰 " + n.title + "</p>";
    });

    document.getElementById("news").innerHTML = html;

  }catch(e){
    document.getElementById("news").innerHTML = "news failed";
  }
}

loadNews();

</script>

</body>
</html>
