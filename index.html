<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Pro Crypto Trading</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b1220;
  color:white;
}

header{
  background:#111827;
  padding:15px;
  text-align:center;
  font-size:18px;
  font-weight:bold;
}

.container{
  max-width:1000px;
  margin:auto;
  padding:20px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:15px;
}

.card{
  background:#111827;
  padding:15px;
  border-radius:10px;
}

input{
  width:100%;
  padding:10px;
  margin-top:8px;
  border:none;
  border-radius:6px;
}

button{
  padding:10px;
  margin-top:10px;
  background:#fbbf24;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

.price{
  font-size:20px;
  color:#22c55e;
}

.nav{
  display:flex;
  justify-content:space-between;
  padding:10px;
  background:#0f172a;
}
</style>
</head>

<body>

<header>Pro Trading Dashboard 📊</header>

<div class="container">

<!-- AUTH -->
<div class="card" id="authBox">
<h2>Login / Signup</h2>
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<button onclick="login()">Enter Trading</button>
</div>

<!-- DASHBOARD -->
<div id="app" style="display:none;">

<div class="nav">
<div>Balance: $<span id="bal">0</span></div>
<div>Profit: $<span id="prof">0</span></div>
<button onclick="logout()">Logout</button>
</div>

<div class="grid">

<!-- PRICES -->
<div class="card">
<h3>BTC Price</h3>
<div class="price">$<span id="btc">...</span></div>
</div>

<!-- DEPOSIT -->
<div class="card">
<h3>Deposit (Demo)</h3>
<input id="dep" placeholder="Amount">
<button onclick="deposit()">Add Funds</button>
</div>

<!-- WITHDRAW -->
<div class="card">
<h3>Withdraw Request</h3>
<button onclick="withdraw()">Request</button>
</div>

<!-- CHART -->
<div class="card">
<h3>BTC Chart</h3>
<iframe src="https://www.tradingview.com/widgetembed/?symbol=BINANCE:BTCUSDT&theme=dark"
width="100%" height="250"></iframe>
</div>

</div>

</div>

<script>

const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  projectId: "YOUR_ID"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

let currentUser = null;

// LOGIN
function login(){
  auth.signInWithEmailAndPassword(email.value,password.value)
  .catch(()=>{
    auth.createUserWithEmailAndPassword(email.value,password.value)
    .then(u=>{
      db.collection("users").doc(u.user.uid).set({
        balance:100,
        profit:0
      });
    });
  });
}

// AUTH STATE
auth.onAuthStateChanged(user=>{
  if(user){
    currentUser = user;

    authBox.style.display="none";
    app.style.display="block";

    const ref = db.collection("users").doc(user.uid);

    ref.onSnapshot(doc=>{
      bal.innerText = doc.data().balance.toFixed(2);
      prof.innerText = doc.data().profit.toFixed(2);
    });

    startProfit(user.uid);
  }
});

// 💰 SIMULATED PROFIT ENGINE (DEMO ONLY)
function startProfit(uid){
  setInterval(()=>{
    const ref = db.collection("users").doc(uid);

    ref.get().then(doc=>{
      let d = doc.data();

      let gain = d.balance * 0.002; // 0.2% every cycle

      ref.update({
        balance: d.balance + gain,
        profit: d.profit + gain
      });
    });

  }, 4000);
}

// 💰 DEPOSIT (DEMO)
function deposit(){
  const amount = parseFloat(dep.value);
  const ref = db.collection("users").doc(currentUser.uid);

  ref.get().then(doc=>{
    ref.update({
      balance: doc.data().balance + amount
    });
  });
}

// 📤 WITHDRAW REQUEST
function withdraw(){
  db.collection("withdrawals").add({
    uid: currentUser.uid,
    status:"pending"
  });

  alert("Request sent");
}

// 🚪 LOGOUT
function logout(){
  auth.signOut();
  location.reload();
}

// 📈 PRICE
async function loadPrice(){
  const r = await fetch("https://api.coingecko.com/api/v3/simple/price?ids=bitcoin&vs_currencies=usd");
  const d = await r.json();
  btc.innerText = d.bitcoin.usd;
}

loadPrice();
setInterval(loadPrice,5000);

</script>

</body>
</html>
